<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Time Off Report redesign concept</title>
  <desc id="desc">Wireframe concept for a summary-first time off report dashboard with filters, KPI cards, charts, and a detailed employee table.</desc>
  <rect width="1440" height="1024" fill="#f4f6f8"/>
  <rect x="48" y="36" width="1344" height="952" rx="24" fill="#ffffff" stroke="#d0d7de"/>

  <text x="88" y="92" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172b4d">Time Off Report</text>
  <text x="1090" y="92" font-family="Arial, sans-serif" font-size="18" fill="#5e6c84">Last updated: Apr 1, 2026</text>
  <text x="88" y="124" font-family="Arial, sans-serif" font-size="18" fill="#5e6c84">Department-level reporting with summary metrics, trends, and employee detail</text>

  <rect x="80" y="154" width="1280" height="70" rx="14" fill="#f7f8fa" stroke="#dfe1e6"/>
  <rect x="104" y="174" width="220" height="30" rx="15" fill="#deebff"/>
  <text x="122" y="194" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0747a6">Department: Marketing</text>
  <rect x="340" y="174" width="230" height="30" rx="15" fill="#e3fcef"/>
  <text x="358" y="194" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#006644">Date: Jan 1 - Dec 31, 2026</text>
  <rect x="586" y="174" width="150" height="30" rx="15" fill="#fffae6"/>
  <text x="604" y="194" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#974f0c">Status: All</text>
  <rect x="1140" y="170" width="96" height="36" rx="10" fill="#253858"/>
  <text x="1167" y="193" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Reset</text>
  <rect x="1248" y="170" width="88" height="36" rx="10" fill="#0052cc"/>
  <text x="1264" y="193" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Export</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="252" width="300" height="112" rx="18" fill="#f7f8fa" stroke="#dfe1e6"/>
    <text x="104" y="288" font-size="16" fill="#5e6c84">Total employees</text>
    <text x="104" y="336" font-size="42" font-weight="700" fill="#172b4d">148</text>
    <text x="220" y="336" font-size="16" fill="#006644">+4%</text>

    <rect x="396" y="252" width="300" height="112" rx="18" fill="#f7f8fa" stroke="#dfe1e6"/>
    <text x="420" y="288" font-size="16" fill="#5e6c84">Approved leave</text>
    <text x="420" y="336" font-size="42" font-weight="700" fill="#172b4d">39</text>
    <text x="516" y="336" font-size="16" fill="#006644">+11%</text>

    <rect x="712" y="252" width="300" height="112" rx="18" fill="#f7f8fa" stroke="#dfe1e6"/>
    <text x="736" y="288" font-size="16" fill="#5e6c84">Days requested</text>
    <text x="736" y="336" font-size="42" font-weight="700" fill="#172b4d">264</text>
    <text x="852" y="336" font-size="16" fill="#bf2600">-3%</text>

    <rect x="1028" y="252" width="332" height="112" rx="18" fill="#f7f8fa" stroke="#dfe1e6"/>
    <text x="1052" y="288" font-size="16" fill="#5e6c84">Days approved</text>
    <text x="1052" y="336" font-size="42" font-weight="700" fill="#172b4d">221</text>
    <text x="1168" y="336" font-size="16" fill="#006644">+7%</text>
  </g>

  <rect x="80" y="392" width="790" height="240" rx="18" fill="#ffffff" stroke="#dfe1e6"/>
  <text x="108" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172b4d">Time Off Trend</text>
  <text x="108" y="456" font-family="Arial, sans-serif" font-size="14" fill="#5e6c84">Monthly requested vs approved days</text>
  <line x1="120" y1="586" x2="832" y2="586" stroke="#dfe1e6" stroke-width="2"/>
  <line x1="120" y1="520" x2="832" y2="520" stroke="#ebecf0" stroke-width="1"/>
  <line x1="120" y1="454" x2="832" y2="454" stroke="#ebecf0" stroke-width="1"/>
  <polyline points="130,556 210,544 290,526 370,534 450,500 530,482 610,470 690,454 770,430 820,446" fill="none" stroke="#0052cc" stroke-width="4"/>
  <polyline points="130,568 210,558 290,540 370,548 450,520 530,506 610,492 690,480 770,462 820,472" fill="none" stroke="#36b37e" stroke-width="4"/>
  <text x="118" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">Jan</text>
  <text x="260" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">Mar</text>
  <text x="402" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">May</text>
  <text x="544" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">Jul</text>
  <text x="686" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">Sep</text>
  <text x="800" y="610" font-family="Arial, sans-serif" font-size="12" fill="#5e6c84">Nov</text>

  <rect x="894" y="392" width="466" height="240" rx="18" fill="#ffffff" stroke="#dfe1e6"/>
  <text x="922" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172b4d">Time Off by Type</text>
  <text x="922" y="456" font-family="Arial, sans-serif" font-size="14" fill="#5e6c84">Current period composition</text>
  <rect x="924" y="494" width="280" height="24" rx="8" fill="#deebff"/>
  <rect x="924" y="532" width="198" height="24" rx="8" fill="#b3d4ff"/>
  <rect x="924" y="570" width="154" height="24" rx="8" fill="#79b8ff"/>
  <text x="924" y="488" font-family="Arial, sans-serif" font-size="14" fill="#172b4d">Vacation</text>
  <text x="924" y="526" font-family="Arial, sans-serif" font-size="14" fill="#172b4d">Sick leave</text>
  <text x="924" y="564" font-family="Arial, sans-serif" font-size="14" fill="#172b4d">Personal</text>
  <text x="1220" y="511" font-family="Arial, sans-serif" font-size="14" fill="#5e6c84">124 days</text>
  <text x="1138" y="549" font-family="Arial, sans-serif" font-size="14" fill="#5e6c84">88 days</text>
  <text x="1094" y="587" font-family="Arial, sans-serif" font-size="14" fill="#5e6c84">65 days</text>

  <rect x="80" y="656" width="1280" height="64" rx="16" fill="#f7f8fa" stroke="#dfe1e6"/>
  <text x="108" y="695" font-family="Arial, sans-serif" font-size="16" fill="#5e6c84">Search employee or request ID</text>
  <rect x="1196" y="672" width="136" height="34" rx="10" fill="#ffffff" stroke="#c1c7d0"/>
  <text x="1220" y="693" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#172b4d">More filters</text>

  <rect x="80" y="744" width="1280" height="208" rx="18" fill="#ffffff" stroke="#dfe1e6"/>
  <text x="108" y="782" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172b4d">Employee Detail</text>
  <rect x="104" y="804" width="1232" height="44" rx="10" fill="#f7f8fa"/>
  <g font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#172b4d">
    <text x="122" y="831">Employee</text>
    <text x="332" y="831">Type</text>
    <text x="456" y="831">Status</text>
    <text x="596" y="831">Start</text>
    <text x="704" y="831">End</text>
    <text x="826" y="831">Requested</text>
    <text x="974" y="831">Approved</text>
    <text x="1118" y="831">Manager</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#172b4d">
    <rect x="104" y="856" width="1232" height="34" fill="#ffffff"/>
    <text x="122" y="878">Ana Rivera</text>
    <text x="332" y="878">Vacation</text>
    <text x="456" y="878">Approved</text>
    <text x="596" y="878">Apr 12</text>
    <text x="704" y="878">Apr 18</text>
    <text x="844" y="878">5</text>
    <text x="992" y="878">5</text>
    <text x="1118" y="878">J. Smith</text>

    <rect x="104" y="890" width="1232" height="34" fill="#f7f8fa"/>
    <text x="122" y="912">Leo Martinez</text>
    <text x="332" y="912">Sick leave</text>
    <text x="456" y="912">Approved</text>
    <text x="596" y="912">Apr 03</text>
    <text x="704" y="912">Apr 04</text>
    <text x="844" y="912">2</text>
    <text x="992" y="912">2</text>
    <text x="1118" y="912">M. Chen</text>
  </g>
</svg>
