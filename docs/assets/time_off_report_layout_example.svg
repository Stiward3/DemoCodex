<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Example Time Off Report layout</title>
  <desc id="desc">Wireframe showing a single-screen time off report with persistent filters, KPI cards, analysis charts, employee table, and a detail drawer.</desc>
  <defs>
    <style>
      .bg { fill: #f3f5f7; }
      .card { fill: #ffffff; stroke: #c7d1db; stroke-width: 2; rx: 18; ry: 18; }
      .soft { fill: #eef3f8; stroke: #c7d1db; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #d8f0eb; stroke: #6fae9f; stroke-width: 2; rx: 14; ry: 14; }
      .alert { fill: #fde9d9; stroke: #d98d4f; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #102a43; }
      .h2 { font: 700 20px Arial, sans-serif; fill: #102a43; }
      .label { font: 600 14px Arial, sans-serif; fill: #486581; }
      .body { font: 400 14px Arial, sans-serif; fill: #334e68; }
      .metric { font: 700 32px Arial, sans-serif; fill: #102a43; }
      .small { font: 400 12px Arial, sans-serif; fill: #627d98; }
      .chip { fill: #ffffff; stroke: #9fb3c8; stroke-width: 1.5; rx: 16; ry: 16; }
      .line { stroke: #4c8bf5; stroke-width: 4; fill: none; }
      .grid { stroke: #d9e2ec; stroke-width: 1; }
      .barA { fill: #81c3b3; }
      .barB { fill: #aac8ff; }
      .barC { fill: #f3b36b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1024" />

  <rect class="card" x="40" y="32" width="1360" height="108" />
  <text class="title" x="72" y="76">Time Off Report</text>
  <text class="body" x="72" y="104">Department-level availability, upcoming leave, and employee detail on a single canvas</text>
  <text class="small" x="72" y="125">Last refreshed: Mar 31, 2026 09:40</text>

  <rect class="soft" x="760" y="50" width="140" height="40" />
  <text class="label" x="778" y="75">Department</text>
  <rect class="soft" x="916" y="50" width="148" height="40" />
  <text class="label" x="934" y="75">Date range</text>
  <rect class="soft" x="1080" y="50" width="130" height="40" />
  <text class="label" x="1102" y="75">Status</text>
  <rect class="soft" x="1226" y="50" width="82" height="40" />
  <text class="label" x="1247" y="75">Reset</text>
  <rect class="accent" x="1320" y="50" width="56" height="40" />
  <text class="label" x="1333" y="75">Export</text>

  <rect class="card" x="40" y="160" width="1360" height="64" />
  <text class="label" x="72" y="199">Advanced filters</text>
  <rect class="chip" x="220" y="180" width="130" height="28" />
  <text class="small" x="236" y="198">Approved</text>
  <rect class="chip" x="362" y="180" width="164" height="28" />
  <text class="small" x="378" y="198">Next 30 days</text>
  <rect class="chip" x="538" y="180" width="144" height="28" />
  <text class="small" x="554" y="198">Engineering</text>
  <text class="small" x="1282" y="199">Collapsed until needed</text>

  <rect class="card" x="40" y="244" width="312" height="130" />
  <text class="label" x="64" y="278">On leave today</text>
  <text class="metric" x="64" y="326">24</text>
  <text class="small" x="64" y="352">+3 vs prior week</text>

  <rect class="card" x="372" y="244" width="312" height="130" />
  <text class="label" x="396" y="278">Upcoming approved leave</text>
  <text class="metric" x="396" y="326">61</text>
  <text class="small" x="396" y="352">Next 30 days</text>

  <rect class="card" x="704" y="244" width="312" height="130" />
  <text class="label" x="728" y="278">Pending requests</text>
  <text class="metric" x="728" y="326">9</text>
  <text class="small" x="728" y="352">Needs review this week</text>

  <rect class="card" x="1036" y="244" width="364" height="130" />
  <text class="label" x="1060" y="278">Coverage risk</text>
  <text class="metric" x="1060" y="326">3 teams</text>
  <text class="small" x="1060" y="352">Overlap above staffing threshold</text>

  <rect class="card" x="40" y="394" width="760" height="262" />
  <text class="h2" x="64" y="430">Absence Trend</text>
  <text class="small" x="64" y="452">Daily employees on leave in selected period</text>
  <line class="grid" x1="80" y1="620" x2="760" y2="620" />
  <line class="grid" x1="80" y1="560" x2="760" y2="560" />
  <line class="grid" x1="80" y1="500" x2="760" y2="500" />
  <line class="grid" x1="80" y1="440" x2="760" y2="440" />
  <path class="line" d="M90 598 C150 540, 210 520, 270 548 S390 620, 450 560 S570 450, 630 470 S710 520, 750 500" />

  <rect class="card" x="820" y="394" width="580" height="262" />
  <text class="h2" x="844" y="430">Leave by Team</text>
  <text class="small" x="844" y="452">Side-by-side comparison is easier to scan than pie slices</text>
  <text class="small" x="844" y="500">Engineering</text>
  <rect class="barA" x="960" y="485" width="320" height="22" rx="11" ry="11" />
  <text class="small" x="1292" y="500">32</text>
  <text class="small" x="844" y="540">Operations</text>
  <rect class="barB" x="960" y="525" width="250" height="22" rx="11" ry="11" />
  <text class="small" x="1222" y="540">25</text>
  <text class="small" x="844" y="580">Sales</text>
  <rect class="barC" x="960" y="565" width="180" height="22" rx="11" ry="11" />
  <text class="small" x="1152" y="580">18</text>

  <rect class="card" x="40" y="676" width="960" height="308" />
  <text class="h2" x="64" y="712">Employee Detail</text>
  <text class="small" x="64" y="734">Sticky header, sorting, and row click for inline detail</text>

  <rect class="soft" x="64" y="754" width="912" height="36" />
  <text class="label" x="84" y="777">Employee</text>
  <text class="label" x="258" y="777">Team</text>
  <text class="label" x="394" y="777">Leave type</text>
  <text class="label" x="544" y="777">Start</text>
  <text class="label" x="654" y="777">End</text>
  <text class="label" x="756" y="777">Days</text>
  <text class="label" x="834" y="777">Status</text>
  <text class="label" x="906" y="777">Risk</text>

  <rect class="card" x="64" y="800" width="912" height="46" />
  <text class="body" x="84" y="828">Ana Rivera</text>
  <text class="body" x="258" y="828">Engineering</text>
  <text class="body" x="394" y="828">Vacation</text>
  <text class="body" x="544" y="828">Apr 03</text>
  <text class="body" x="654" y="828">Apr 07</text>
  <text class="body" x="756" y="828">5</text>
  <text class="body" x="834" y="828">Approved</text>
  <text class="body" x="906" y="828">Low</text>

  <rect class="card" x="64" y="854" width="912" height="46" />
  <text class="body" x="84" y="882">Luis Gomez</text>
  <text class="body" x="258" y="882">Operations</text>
  <text class="body" x="394" y="882">Sick leave</text>
  <text class="body" x="544" y="882">Apr 01</text>
  <text class="body" x="654" y="882">Apr 02</text>
  <text class="body" x="756" y="882">2</text>
  <text class="body" x="834" y="882">Approved</text>
  <text class="body" x="906" y="882">Medium</text>

  <rect class="card" x="64" y="908" width="912" height="46" />
  <text class="body" x="84" y="936">Sofia Patel</text>
  <text class="body" x="258" y="936">Sales</text>
  <text class="body" x="394" y="936">Parental</text>
  <text class="body" x="544" y="936">Apr 15</text>
  <text class="body" x="654" y="936">May 30</text>
  <text class="body" x="756" y="936">33</text>
  <text class="body" x="834" y="936">Pending</text>
  <text class="body" x="906" y="936">High</text>

  <rect class="card" x="1020" y="676" width="380" height="308" />
  <text class="h2" x="1044" y="712">Detail Drawer</text>
  <text class="small" x="1044" y="734">Opened from the selected row without leaving the page</text>
  <text class="label" x="1044" y="782">Employee</text>
  <text class="body" x="1140" y="782">Sofia Patel</text>
  <text class="label" x="1044" y="818">Manager</text>
  <text class="body" x="1140" y="818">R. Chen</text>
  <text class="label" x="1044" y="854">Coverage note</text>
  <text class="body" x="1140" y="854">Quarter-end overlap with 2 peers</text>
  <text class="label" x="1044" y="890">History</text>
  <rect class="soft" x="1140" y="872" width="212" height="78" />
  <text class="small" x="1158" y="898">Vacation in Jan: 4 days</text>
  <text class="small" x="1158" y="922">Parental request submitted Mar 28</text>

  <rect class="alert" x="1020" y="948" width="380" height="36" />
  <text class="small" x="1044" y="971">Use the drawer for context; keep critical risk signals visible in the table and cards</text>
</svg>
