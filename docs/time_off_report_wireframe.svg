<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc">
  <title id="title">Time Off Report wireframe</title>
  <desc id="desc">Dashboard mockup with header, filter rail, KPI cards, three analysis panels, and employee detail table.</desc>
  <style>
    .bg { fill: #f5f1e8; }
    .panel { fill: #fffdf8; stroke: #2f4858; stroke-width: 2; rx: 18; }
    .accent { fill: #d6e4d8; stroke: #2f4858; stroke-width: 2; rx: 18; }
    .kpi { fill: #f4d6ae; stroke: #2f4858; stroke-width: 2; rx: 16; }
    .table-head { fill: #d9e8f5; stroke: #2f4858; stroke-width: 2; rx: 12; }
    .text { fill: #1f2a30; font-family: Arial, sans-serif; }
    .title { font-size: 30px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    .muted { fill: #5f6b73; }
    .line { stroke: #2f4858; stroke-width: 2; }
    .dash { stroke: #5f6b73; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
  </style>

